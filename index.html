<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrados Gastos</title>

    <link rel="stylesheet" href="./dist/css/style.css">
</head>
<body>
    <main class="main">
        <h1 class="main__title">Gasto semanal</h1>
        <div class="main__contenedor">
            <form class="form">
                <legend class="form__legend">Añade tus gastos aquí</legend>
    
                <div class="campo">
                    <label for="gasto">Gasto: </label>
                    <input type="text" name="gasto" id="gasto" placeholder="Nombre gasto">
                </div>
                <div class="campo">
                    <label for="cantidad">Cantidad: </label>
                    <input type="text" name="cantidad" id="cantidad" placeholder="Cantidad en $">
                </div>
    
                <button class="submit" type="submit">Agregar</button>
            </form>
            <section class="listado">
                <h2 class="listado__title">Listado</h2>
    
                <ul class="listado__ul">
                </ul>
    
                <p class="presupuesto">Presupuesto: $ <span class="presupuesto__span"></span></p>
                <p class="cantidad">Cantidad: $ <span class="cantidad__span"></span></p>
            </section>
        </div>
    </main>
    <script src="./dist/js/app.js"></script>
</body>
</html>
